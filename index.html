<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tooltip · shadcn rebuild demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <p class="caption">Hover the icon to see the tooltip.</p>

    <div class="tip-row">
      <button class="tip-trigger" aria-describedby="copy-tip">
        <span aria-hidden="true">⧉</span>
      </button>
      <span id="copy-tip" class="tip" role="tooltip">Copy to clipboard</span>
    </div>
  </main>
</body>
</html>
