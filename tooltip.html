<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tooltip · sibling-combinator demo</title>
  <link rel="stylesheet" href="tooltip.css" />
</head>
<body>
  <main class="wrap">
    <h1 class="title">Tooltip · pure CSS</h1>

    <div class="tip-row">
      <!-- TYPE THE TOOLTIP MARKUP -->
      <button class="tip-trigger" aria-describedby="copy-tip">
        Copy link
      </button>
      <span id="copy-tip" class="tip" role="tooltip">Hover or focus me</span>

    </div>

  </main>
</body>
</html>
