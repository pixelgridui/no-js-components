<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dialog · shadcn rebuild demo</title>
  <link rel="stylesheet" href="dialog.css" />
</head>
<body>
  <main class="wrap">
    <h1 class="title">Dialog · pure CSS</h1>

    <!-- TYPE THE DIALOG MARKUP -->
    <button popovertarget="dlg">Open dialog</button>
    <div id="dlg" popover>
      <h2>Hello.</h2>
      <p>This dialog uses zero JavaScript.</p>
      <button popovertarget="dlg" popovertargetaction="hide">Close</button>
    </div>

  </main>
</body>
</html>
