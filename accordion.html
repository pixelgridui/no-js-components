<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Accordion · details + interpolate-size demo</title>
  <link rel="stylesheet" href="accordion.css" />
</head>
<body>
  <main class="wrap">
    <h1 class="title">Accordion · pure CSS</h1>

    <div class="accordion">
      <!-- TYPE THE ACCORDION MARKUP -->
      <details>
        <summary>What's an accordion?</summary>
        <p>A list of expandable rows. One or many can be open.</p>
      </details>
      <details>
        <summary>Why pure CSS?</summary>
        <p>Zero JavaScript. The browser handles open state, keyboard, focus.</p>
      </details>
      <details>
        <summary>Is it accessible?</summary>
        <p>Yes — details/summary ships with role="group", Tab focus, Space/Enter to toggle.</p>
      </details>

    </div>

  </main>
</body>
</html>
